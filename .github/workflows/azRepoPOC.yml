name: Download Azure Artifacts Universal Package

on:
  workflow_dispatch:
    inputs:
      packageName:
        description: 'Universal package name'
        required: true
      packageVersion:
        description: 'Version (e.g., 1.2.3 or 1.2.* if you resolve it yourself)'
        required: true

jobs:
  download-universal:
    runs-on: ubuntu-latest
    steps:
      - name: Install Azure CLI + DevOps extension
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          az extension add -n azure-devops
      
      - name: Authenticate to Azure DevOps (PAT)
        env:
          AZDO_PAT: ${{ secrets.AZDO_PAT }}
        run: |
          # Either of these works; doing both is safe:
          echo "$AZDO_PAT" | az devops login --organization "${{ secrets.AZDO_ORG }}"
          # Also export the special env var read by the DevOps extension
          echo "AZURE_DEVOPS_EXT_PAT=$AZDO_PAT" >> $GITHUB_ENV

      - name: Configure Azure DevOps
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZDO_PAT }}
        run: |
          az devops configure --defaults organization="${{ secrets.AZDO_ORG }}" project="${{ secrets.AZDO_PROJECT }}"

      - name: Download Universal package
        env:
          PROJ: ${{ secrets.AZDO_PROJECT }}
          ORG: ${{ secrets.AZDO_ORG }}
          FEED: ${{ secrets.AZDO_FEED }}
          NAME: ${{ inputs.packageName }}
          VERSION: ${{ inputs.packageVersion }}
        run: |
          mkdir -p package
          az artifacts universal download \
            --organization "$ORG"\
            --project "$PROJ"\
            --scope project\
            --feed "$FEED" \
            --name "$NAME" \
            --version "$VERSION" \
            --path package
          echo "Downloaded to $(pwd)/packages"
          ls -la packages
      - name: Upload downloaded package as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-package
          path: packages/        # <-- the folder you used in az artifacts universal download --path
          if-no-files-found: error
          retention-days: 30     # adjust as per your org’s policy
